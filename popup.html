<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a2e;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-top: 1px solid #e2e8f0;
    }
    .toggle-row:first-of-type { border-top: none; }
    .toggle-label {
      font-size: 13px;
      font-weight: 500;
      color: #1a1a2e;
    }
    .toggle-label small {
      display: block;
      font-size: 11px;
      font-weight: 400;
      color: #64748b;
      margin-top: 2px;
    }
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }
    .switch input {
      opacity: 0; width: 0; height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #cbd5e1;
      transition: .3s;
      border-radius: 22px;
    }
    .slider:before {
      content: "";
      position: absolute;
      height: 16px; width: 16px;
      left: 3px; bottom: 3px;
      background: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider { background: #003D7A; }
    input:checked + .slider:before { transform: translateX(18px); }
    .footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #e2e8f0;
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="6" fill="#003D7A"/>
      <text x="14" y="19" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="Inter">ITS</text>
    </svg>
    <h1>SIAKAD-ITS Theme</h1>
  </div>

  <div class="toggle-row">
    <div class="toggle-label">
      Modern UI
      <small>Overhaul tampilan keseluruhan</small>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggleMain">
      <span class="slider"></span>
    </label>
  </div>

  <div class="footer">v1.0 — by Ararya</div>

  <script src="popup.js"></script>
</body>
</html>
